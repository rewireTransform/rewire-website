<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JCQ Suite Reservations — Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
/* ---------------------------------------------------
   BASE + ORIGINAL STYLES (unchanged)
--------------------------------------------------- */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#007B7F;--teal-light:#00a3a8;--teal-faint:rgba(0,123,127,0.12);
  --dark:#0a0a0a;--surface:#111111;--card:#161616;--border:#1e1e1e;
  --border-mid:#2a2a2a;

  /* UPDATED CONTRAST COLORS */
  --text:#ffffff;
  --muted:#e5e9ec;
  --dim:#c7cdd2;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--dark);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  cursor:none;
}

/* ---------------------------------------------------
   DESKTOP FONT SCALING (1.5×)
--------------------------------------------------- */
@media (min-width:1200px){
  .scene-body,
  .ui-content,
  .ui-field-label,
  .ui-date-field,
  .ui-event-meta,
  .ui-admin-sub,
  .ui-req-meta,
  .ui-private-meta,
  .ui-date-label,
  .ui-pill,
  .ui-suite-meta {
    font-size:1.5em !important;
  }

  .scene-title{
    font-size:calc(1.5 * clamp(28px,3.5vw,48px)) !important;
  }

  .title-h1{
    font-size:calc(1.5 * clamp(48px,6vw,80px)) !important;
  }
}

/* ---------------------------------------------------
   STRONGER CONTRAST OVERRIDES
--------------------------------------------------- */
.ui-event-meta,
.ui-field-label,
.ui-date-field,
.ui-admin-sub,
.ui-private-meta,
.ui-req-meta {
  color:#e5e9ec !important;
}

/* ---------------------------------------------------
   MOBILE FIXES — FORCE CONTENT TO TOP
--------------------------------------------------- */
@media (max-width:900px){

  html,body{
    overflow:auto !important;
    cursor:auto;
    scroll-behavior:smooth;
  }

  .slide{
    position:relative !important;
    min-height:100vh;
    height:auto !important;
    padding-top:0 !important;
    padding-bottom:40px;
    scroll-margin-top:0;
  }

  .scene-left,
  .scene-right{
    margin-top:0 !important;
    padding-top:20px !important;
  }

  .cursor,.cursor-ring,.grain{
    display:none !important;
  }
}

/* ---------------------------------------------------
   ORIGINAL CSS CONTINUES BELOW (unchanged)
--------------------------------------------------- */

/* (… your entire original CSS remains here …) */

</style>
</head>

<body>

<!-- (YOUR FULL ORIGINAL HTML CONTENT GOES HERE UNCHANGED) -->

<!-- ---------------------------------------------------
     UPDATED SCRIPT — AUTO-SCROLL TO TOP ON SLIDE CHANGE
--------------------------------------------------- -->
<script>
const TOTAL = 9;
let current = 0;

// Cursor
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
  ring.style.left = e.clientX + 'px';
  ring.style.top = e.clientY + 'px';
});

// Dots
const dotsEl = document.getElementById('dots');
for(let i=0;i<TOTAL;i++){
  const d = document.createElement('div');
  d.className = 'dot'+(i===0?' on':'');
  d.onclick = e => { e.stopPropagation(); goTo(i); };
  dotsEl.appendChild(d);
}

function goTo(n) {
  if(n < 0 || n >= TOTAL) return;

  document.getElementById('s'+current).classList.remove('active');
  current = n;
  document.getElementById('s'+current).classList.add('active');

  document.querySelectorAll('.dot').forEach((d,i) =>
    d.classList.toggle('on', i===current)
  );

  document.getElementById('counter').textContent =
    String(current+1).padStart(2,'0')+' / '+String(TOTAL).padStart(2,'0');

  document.getElementById('progress').style.width =
    ((current+1)/TOTAL*100)+'%';

  document.getElementById('arrowLeft').classList.toggle('hidden', current===0);
  document.getElementById('arrowRight').classList.toggle('hidden', false);

  /* NEW: ALWAYS START SLIDE AT TOP ON MOBILE */
  window.scrollTo({ top: 0, behavior: 'instant' });
}

document.addEventListener('click', () =>
  goTo(current===TOTAL-1 ? 0 : current+1)
);

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter')
    goTo(current===TOTAL-1 ? 0 : current+1);
  if(e.key==='ArrowLeft')
    goTo(current-1);
});

document.getElementById('progress').style.width = (1/TOTAL*100)+'%';
</script>

</body>
</html>
